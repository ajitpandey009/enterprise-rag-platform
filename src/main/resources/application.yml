# ============================================================
# Enterprise RAG Platform — Application Configuration
# ============================================================
# This configuration supports multiple profiles:
#   - default (dev with Ollama)
#   - docker  (containerized deployment)
#   - openai  (use OpenAI instead of Ollama)
# ============================================================

server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: enterprise-rag-platform

  # --- Database Configuration ---
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/ragplatform}
    username: ${DB_USERNAME:raguser}
    password: ${DB_PASSWORD:ragpassword}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate  # Flyway manages schema
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # --- Flyway Database Migrations ---
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # --- File Upload Limits ---
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

  # --- Async Task Execution ---
  task:
    execution:
      pool:
        core-size: 4
        max-size: 8
        queue-capacity: 100
      thread-name-prefix: rag-async-

# ============================================================
# LangChain4j Configuration — Ollama (Default)
# ============================================================
langchain4j:
  ollama:
    chat-model:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      model-name: ${OLLAMA_CHAT_MODEL:llama3}
      temperature: 0.3
      timeout: 120s
      log-requests: true
      log-responses: false
    streaming-chat-model:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      model-name: ${OLLAMA_CHAT_MODEL:llama3}
      temperature: 0.3
      timeout: 120s
    embedding-model:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      model-name: ${OLLAMA_EMBEDDING_MODEL:nomic-embed-text}
      timeout: 120s
      log-requests: true

# ============================================================
# Application-Specific Configuration
# ============================================================
app:
  # --- JWT Security ---
  jwt:
    secret: ${JWT_SECRET:c2VjdXJlLWVudGVycHJpc2UtcmFnLXBsYXRmb3JtLWp3dC1zZWNyZXQta2V5LXRoYXQtaXMtbG9uZy1lbm91Z2g=}
    expiration-ms: ${JWT_EXPIRATION:86400000}  # 24 hours
    refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION:604800000}  # 7 days

  # --- RAG Pipeline Settings ---
  rag:
    # Document chunking
    chunk-size: ${RAG_CHUNK_SIZE:500}
    chunk-overlap: ${RAG_CHUNK_OVERLAP:50}
    # Embedding dimensions (768 for nomic-embed-text, 1536 for OpenAI)
    embedding-dimension: ${EMBEDDING_DIMENSION:768}
    # Retrieval settings
    max-results: ${RAG_MAX_RESULTS:5}
    min-score: ${RAG_MIN_SCORE:0.5}
    # Prompt template
    system-prompt: |
      You are an enterprise knowledge assistant for internal documentation.
      Answer the question based ONLY on the provided context from uploaded documents.
      If the context doesn't contain enough information to answer, say:
      "I don't have enough information in the uploaded documents to answer this question."
      Always cite which document(s) your answer is based on.
      Be precise, professional, and thorough.

  # --- PgVector Embedding Store ---
  pgvector:
    host: ${DB_HOST:localhost}
    port: ${DB_PORT:5432}
    database: ${DB_NAME:ragplatform}
    user: ${DB_USERNAME:raguser}
    password: ${DB_PASSWORD:ragpassword}
    table: document_embeddings
    dimension: ${EMBEDDING_DIMENSION:768}

  # --- Chat Memory ---
  chat:
    max-memory-messages: ${CHAT_MAX_MEMORY:20}

  # --- CORS ---
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3000,http://localhost:5173}

# ============================================================
# Swagger / OpenAPI
# ============================================================
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  default-produces-media-type: application/json

# ============================================================
# Actuator / Observability
# ============================================================
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized

# ============================================================
# Logging
# ============================================================
logging:
  level:
    root: INFO
    com.enterprise.rag: DEBUG
    dev.langchain4j: DEBUG
    org.springframework.security: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [%X{correlationId}] %-5level %logger{36} - %msg%n"

---
# ============================================================
# Docker Profile
# ============================================================
spring:
  config:
    activate:
      on-profile: docker
  datasource:
    url: jdbc:postgresql://postgres:5432/ragplatform

langchain4j:
  ollama:
    chat-model:
      base-url: http://ollama:11434
    streaming-chat-model:
      base-url: http://ollama:11434
    embedding-model:
      base-url: http://ollama:11434

app:
  pgvector:
    host: postgres
  cors:
    allowed-origins: http://localhost:3000

---
# ============================================================
# OpenAI Profile (activate with --spring.profiles.active=openai)
# ============================================================
spring:
  config:
    activate:
      on-profile: openai

langchain4j:
  open-ai:
    chat-model:
      api-key: ${OPENAI_API_KEY}
      model-name: ${OPENAI_CHAT_MODEL:gpt-4o}
      temperature: 0.3
      log-requests: true
      log-responses: false
    embedding-model:
      api-key: ${OPENAI_API_KEY}
      model-name: ${OPENAI_EMBEDDING_MODEL:text-embedding-3-small}
      log-requests: true
  # Disable Ollama when using OpenAI
  ollama:
    chat-model:
      base-url: ""
    embedding-model:
      base-url: ""

app:
  rag:
    embedding-dimension: 1536
  pgvector:
    dimension: 1536
